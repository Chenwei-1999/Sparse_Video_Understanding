name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install minimal dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install numpy tensordict
          python -m pip install --no-deps -e .

      - name: Run CPU sanity tests
        run: |
          pytest -q \
            tests/test_base_config_on_cpu.py \
            tests/test_protocol_on_cpu.py \
            tests/test_protocol_v2_on_cpu.py \
            tests/test_backend_version_gates.py

  gpu-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, gpu]
    timeout-minutes: 120
    strategy:
      matrix:
        engine: [sglang, vllm]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install CUDA torch + runtime deps
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        run: |
          python -m pip install --upgrade pip
          python -m pip install "torch==2.6.0" "torchvision==0.21.0" --index-url https://download.pytorch.org/whl/cu124
          python -m pip install -r requirements-test.txt
          python -m pip install -r requirements_sglang.txt
          python -m pip install -r requirements-cuda.txt
          python -m pip install --no-deps -e .

      - name: Smoke run (${{ matrix.engine }})
        env:
          ENGINE: ${{ matrix.engine }}
          CUDA_VISIBLE_DEVICES: 0,1,2,3
        run: |
          ./examples/revise/run_revise_nextqa_smoke.sh --config-name revise_nextqa_smoke
