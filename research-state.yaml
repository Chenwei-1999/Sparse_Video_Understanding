research_question:
  primary: >
    Can we detect errors in multi-round video reasoning chains without human-labeled process data,
    and can those detections be used to improve downstream VideoQA accuracy?
  scope:
    - Focus on REVISE-style multi-round summaries and answer decisions.
    - Prefer annotation-free or synthetic supervision over human process labels.
    - Use local/Hugging Face open models only; no OpenAI/Gemini for experiments.
  success_criteria:
    - Increase process-error detection quality over simple heuristics or no-critic baselines.
    - Show that acting on detected errors improves VideoQA accuracy versus the same base reasoner without intervention.

