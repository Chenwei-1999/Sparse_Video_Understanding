hypotheses:
  H1:
    name: Risk-calibrated process critic from synthetic chains transfers to REVISE traces
    motivation: >
      The local VideoCritic data already contains large-scale synthetic process errors.
      A critic trained on chain text plus light metadata may learn general risk signals that correlate
      with downstream QA failure in REVISE traces even without human process labels.
    prediction: >
      Critic score will separate correct vs incorrect REVISE final answers and identify high-risk rounds
      better than format-only heuristics.
    status: active
  H2:
    name: Selective intervention beats always-revise
    motivation: >
      Existing revision experiments show that broad revision often breaks correct answers.
      If a critic can gate only high-risk chains, intervention should yield a positive net gain.
    prediction: >
      Critic-gated revise/re-answer will improve NExT-QA accuracy over vanilla REVISE and over unconditional revise.
    status: pending
  H3:
    name: Round-level inconsistency signals are enough for an annotation-free baseline
    motivation: >
      REVISE exposes POHR summaries, requested frames, and answer transitions. Internal inconsistency,
      unsupported jumps, and uncertainty/answer mismatch may provide a cheap baseline without any learned critic.
    prediction: >
      Simple process features will already correlate with error, but a learned critic will outperform them.
    status: active

evaluation:
  detection:
    primary_metrics:
      - AUROC for predicting final QA correctness from process trace
      - AUPRC on incorrect-answer detection
      - F1 / recall@fixed-budget for selecting risky chains
    baselines:
      - no detector
      - format-invalid heuristic
      - process-feature logistic baseline
  intervention:
    primary_metrics:
      - final NExT-QA accuracy
      - delta accuracy on high-risk subset
      - break rate on originally correct answers
      - fix rate on originally incorrect answers
    baselines:
      - vanilla REVISE
      - always revise / reread
      - heuristic-gated revise

current_direction:
  phase: bootstrap_to_first_inner_loop
  highest_priority_experiment: H1 process-risk calibration on existing logs
  rationale: >
    This is the fastest path to determine whether the repo can support a solid process-error story
    without expensive end-to-end retraining.

next_actions:
