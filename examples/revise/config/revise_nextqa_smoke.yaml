hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  custom_cls:
    path: pkg://verl.utils.dataset.nextqa_dataset
    name: NextQADataset
  nextqa:
    video_root: /shares/hlw3876/chenwei/NExT-QA/NExTVideo
    map_json: /shares/hlw3876/chenwei/NExT-QA/map_vid_vidorID.json
  train_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/train.csv
  val_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/val.csv
  max_prompt_length: 4096
  max_response_length: 256
  train_batch_size: 1
  max_samples: 16
  return_raw_chat: True
  return_multi_modal_inputs: False

actor_rollout_ref:
  model:
    path: ${oc.env:REVISE_QWEN25_VL_3B_PATH,/shares/hlw3876/chenwei/hf_cache/models--Qwen--Qwen2.5-VL-3B-Instruct/snapshots/66285546d2b821cf421d4f5eb2576359d3770cd3}
  rollout:
    name: sglang
    prompt_length: ${data.max_prompt_length}
    response_length: ${data.max_response_length}
    temperature: 0.2
    top_p: 0.9
    do_sample: True
    n: 2
    # keep vLLM/sglang stable for multimodal by disabling speculative helpers
    enable_chunked_prefill: False
    enable_prefix_caching: False
    load_format: auto
    engine_kwargs:
      vllm:
        mm_encoder_attn_backend: torch_sdpa
    data_parallel_size: 1
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    agent:
      default_agent_loop: revise_agent
    revise:
      max_rounds: 2
      max_frames_per_round: 2
      max_retries_per_round: 0
      initial_sampling: uniform
      include_timestamps: True

algorithm:
  adv_estimator: grpo

trainer:
  project_name: revise_nextqa
  experiment_name: qwen2.5-vl-3b-revise-smoke
  total_epochs: 1
  n_gpus_per_node: 4
  train_batch_size: ${data.train_batch_size}
  test_freq: 1
  save_freq: -1
  val_only: True

ray_kwargs:
  ray_init:
    num_cpus: 16
