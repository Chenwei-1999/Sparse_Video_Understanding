hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - sft_trainer
  - _self_

data:
  train_files: ${hydra:runtime.cwd}/outputs/sft_data/videoespresso_revise_sft_train.parquet
  val_files: ${hydra:runtime.cwd}/outputs/sft_data/videoespresso_revise_sft_val.parquet
  multiturn:
    enable: true
    messages_key: messages
  max_length: 4096
  truncation: right
  train_batch_size: 16
  micro_batch_size_per_gpu: 2
  balance_dp_token: true

model:
  partial_pretrain: /shares/hlw3876/chenwei/hf_cache/models--Qwen--Qwen2.5-VL-3B-Instruct/snapshots/66285546d2b821cf421d4f5eb2576359d3770cd3
  fsdp_config:
    model_dtype: bfloat16
    wrap_policy:
      min_num_params: 0
    cpu_offload: false
    offload_params: false
  enable_gradient_checkpointing: true
  trust_remote_code: false
  lora_rank: 0
  strategy: fsdp

optim:
  lr: 2e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01
  lr_warmup_steps_ratio: 0.05
  clip_grad: 1.0
  lr_scheduler: cosine

ulysses_sequence_parallel_size: 1
use_remove_padding: false

trainer:
  default_local_dir: ${hydra:runtime.cwd}/outputs/revise_videoespresso_sft
  project_name: revise-videoespresso-sft
  experiment_name: qwen2.5-vl-3b-sft
  total_epochs: 2
  total_training_steps: null
  logger: ["console", "wandb"]
  seed: 42
  save_freq: -1
  test_freq: 50
  nnodes: 1
  n_gpus_per_node: 4
  resume_mode: auto
  checkpoint:
    save_contents: ["model", "hf_model"]
  device: cuda
