hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

custom_reward_function:
  path: pkg://verl.utils.reward_score.accuracy_with_format
  name: compute_score
  reward_kwargs:
    reward_weights:
      answer: 1.0
      format: 0.05
      think: 0.02
      summary: 0.05
      illegal_action_penalty: 2.0

data:
  custom_cls:
    path: pkg://verl.utils.dataset.nextqa_dataset
    name: NextQADataset
  nextqa:
    video_root: /shares/hlw3876/chenwei/NExT-QA/NExTVideo
    map_json: /shares/hlw3876/chenwei/NExT-QA/map_vid_vidorID.json
  train_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/train.csv
  val_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/val.csv
  max_prompt_length: 8192
  # IMPORTANT: multi-round REVISE trajectories can be long (especially with vision tokens).
  # Keep a large padding budget to avoid truncation-related shape mismatches in VLM RoPE indexing.
  max_response_length: 4096
  train_batch_size: 2
  dataloader_num_workers: 0
  return_raw_chat: True
  return_multi_modal_inputs: False

actor_rollout_ref:
  model:
    path: ${oc.env:REVISE_QWEN25_VL_3B_PATH,/shares/hlw3876/chenwei/hf_cache/models--Qwen--Qwen2.5-VL-3B-Instruct/snapshots/66285546d2b821cf421d4f5eb2576359d3770cd3}
  ref:
    fsdp_config:
      model_dtype: bfloat16
  actor:
    fsdp_config:
      model_dtype: bfloat16
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 128
    use_dynamic_bsz: True
    use_kl_loss: True
    kl_loss_coef: 0.01
    entropy_coeff: 0
    checkpoint:
      save_contents: ["hf_model"]
      load_contents: []
  rollout:
    name: vllm
    prompt_length: ${data.max_prompt_length}
    response_length: ${data.max_response_length}
    # vLLM per-call generation cap (kept small for speed), decoupled from padding budget above.
    max_new_tokens: 128
    temperature: 0.2
    top_p: 0.9
    do_sample: True
    n: 4
    dtype: bfloat16
    gpu_memory_utilization: 0.6
    enable_chunked_prefill: False
    enable_prefix_caching: False
    load_format: auto
    # Keep some headroom to avoid rare prompt overflows from vision tokens + multi-round context.
    max_model_len: 12288
    max_num_batched_tokens: 12288
    data_parallel_size: 1
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 1
    # REVISE accumulates frames across rounds; allow up to max_rounds * max_frames_per_round.
    limit_images: 25
    agent:
      default_agent_loop: revise_agent
      rollout_mode: hybrid
    revise:
      max_rounds: 5
      max_frames_per_round: 5
      max_vision_inputs: 25
      max_retries_per_round: 0
      initial_sampling: uniform
      include_timestamps: True
      terminate_on_invalid_action: True

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: False
  kl_ctrl:
    type: adaptive
    kl_coef: 0.01
    target_kl: 0.1

trainer:
  project_name: revise_nextqa
  experiment_name: qwen2.5-vl-3b-revise-grpo-acc-format-mt-100-len12k
  total_epochs: 1
  total_training_steps: 100
  n_gpus_per_node: 4
  resume_mode: disable
  val_before_train: False
  test_freq: -1
  save_freq: 100
  max_actor_ckpt_to_keep: 1
  logger: ["console", "wandb"]
  default_local_dir: outputs/2026-01-18/revise_nextqa_grpo_acc_format_reward_multiturn_100_len12k

ray_kwargs:
  ray_init:
    num_cpus: 32
