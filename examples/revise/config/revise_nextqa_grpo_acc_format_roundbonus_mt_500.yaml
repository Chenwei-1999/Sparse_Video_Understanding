hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

custom_reward_function:
  path: pkg://verl.utils.reward_score.accuracy_with_format
  name: compute_score
  reward_kwargs:
    reward_weights:
      # Primary objective: final answer correctness.
      answer: 1.0

      # Small conditional bonuses (applied only when correct; see implementation).
      format: 0.05
      summary: 0.05
      think: 0.0

      # Multi-round shaping: reward making REAL progress (requesting NEW frames).
      # Applied even if the final answer is wrong, so the <frames> action gets learnable signal.
      effective_round_bonus: 0.05

      # Hard negative for illegal actions (missing/invalid tags, seen/out-of-range frames, <think>, etc.).
      illegal_action_penalty: 10.0

data:
  custom_cls:
    path: pkg://verl.utils.dataset.nextqa_dataset
    name: NextQADataset
  nextqa:
    video_root: /shares/hlw3876/chenwei/NExT-QA/NExTVideo
    map_json: /shares/hlw3876/chenwei/NExT-QA/map_vid_vidorID.json
  train_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/train.csv
  val_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/val.csv
  max_prompt_length: 8192
  max_response_length: 4096
  train_batch_size: 2
  dataloader_num_workers: 0
  return_raw_chat: True
  return_multi_modal_inputs: False

actor_rollout_ref:
  model:
    path: /shares/hlw3876/chenwei/hf_cache/hub/models--Qwen--Qwen2.5-VL-3B-Instruct/snapshots/66285546d2b821cf421d4f5eb2576359d3770cd3
    use_fused_kernels: True
  ref:
    fsdp_config:
      model_dtype: bfloat16
  actor:
    fsdp_config:
      model_dtype: bfloat16
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 128
    use_dynamic_bsz: True
    use_kl_loss: True
    # Slightly weaker than default to reduce implicit bias toward short trajectories.
    kl_loss_coef: 0.005
    entropy_coeff: 0
    checkpoint:
      save_contents: ["hf_model"]
      load_contents: []
  rollout:
    name: vllm
    prompt_length: ${data.max_prompt_length}
    response_length: ${data.max_response_length}
    max_new_tokens: 128
    temperature: 0.2
    top_p: 0.9
    do_sample: True
    n: 4
    dtype: bfloat16
    gpu_memory_utilization: 0.6
    enable_chunked_prefill: False
    enable_prefix_caching: False
    load_format: auto
    max_model_len: 12288
    max_num_batched_tokens: 12288
    data_parallel_size: 1
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 1
    limit_images: 25
    agent:
      default_agent_loop: revise_agent
      rollout_mode: hybrid
    revise:
      max_rounds: 5
      max_frames_per_round: 5
      max_vision_inputs: 25
      max_retries_per_round: 0
      initial_sampling: uniform
      include_timestamps: True
      terminate_on_invalid_action: True
      # Prompt tweaks to reduce "copy seen frames" illegal actions.
      hide_seen_frames_in_prompt: True
      include_candidate_frames_in_prompt: True
      candidate_frames_in_prompt_k: 12

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: False
  kl_ctrl:
    type: adaptive
    kl_coef: 0.01
    target_kl: 0.1

trainer:
  project_name: revise_nextqa
  experiment_name: qwen2.5-vl-3b-revise-grpo-acc-format-roundbonus-mt-500
  total_epochs: 1
  total_training_steps: 500
  n_gpus_per_node: 4
  resume_mode: disable
  val_before_train: False
  test_freq: -1
  save_freq: 100
  max_actor_ckpt_to_keep: 2
  logger: ["console", "wandb"]
  default_local_dir: /shares/hlw3876/chenwei/verl_outputs/outputs/2026-01-19/revise_nextqa_grpo_acc_format_roundbonus_mt_500

ray_kwargs:
  ray_init:
    num_cpus: 32
