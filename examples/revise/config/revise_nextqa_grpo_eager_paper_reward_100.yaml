hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

custom_reward_function:
  path: pkg://verl.utils.reward_score.eager_videoqa_paper
  name: compute_score
  reward_kwargs:
    # r_t = λ1 r_conf + λ2 r_sum + λ3 r_stop + r_format
    lambda_conf: 1.0
    lambda_sum: 1.0
    lambda_stop: 0.5
    gamma: 0.99
    format_reward: 0.05
    stop_round_threshold: 2

data:
  custom_cls:
    path: pkg://verl.utils.dataset.nextqa_dataset
    name: NextQADataset
  nextqa:
    video_root: /shares/hlw3876/chenwei/NExT-QA/NExTVideo
    map_json: /shares/hlw3876/chenwei/NExT-QA/map_vid_vidorID.json
  train_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/train.csv
  val_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/val.csv
  max_prompt_length: 8192
  # Multi-turn REVISE trajectories include user turns + vision tokens; keep a large padding budget.
  max_response_length: 4096
  train_batch_size: 2
  return_raw_chat: True
  return_multi_modal_inputs: False

actor_rollout_ref:
  model:
    path: /shares/hlw3876/chenwei/hf_cache/hub/models--Qwen--Qwen2.5-VL-3B-Instruct/snapshots/66285546d2b821cf421d4f5eb2576359d3770cd3
  ref:
    fsdp_config:
      model_dtype: bfloat16
  actor:
    fsdp_config:
      model_dtype: bfloat16
    optim:
      lr: 1e-6
    ppo_mini_batch_size: 128
    use_dynamic_bsz: True
    use_kl_loss: True
    kl_loss_coef: 0.001
    entropy_coeff: 0
    checkpoint:
      save_contents: ["hf_model"]
      load_contents: []
  rollout:
    name: vllm
    prompt_length: ${data.max_prompt_length}
    response_length: ${data.max_response_length}
    # Generation length per assistant turn (keep small even if response_length is large).
    max_new_tokens: 128
    temperature: 0.2
    top_p: 0.9
    do_sample: True
    n: 4
    dtype: bfloat16
    gpu_memory_utilization: 0.6
    enable_chunked_prefill: False
    enable_prefix_caching: False
    load_format: auto
    max_model_len: 12288
    max_num_batched_tokens: 12288
    data_parallel_size: 1
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 1
    # Agent loop accumulates images across rounds; keep a small cap so prompts remain lightweight and align with eval.
    limit_images: 5
    agent:
      default_agent_loop: revise_agent
      rollout_mode: hybrid
    revise:
      max_rounds: 4
      max_frames_per_round: 3
      max_vision_inputs: 5
      max_retries_per_round: 1
      initial_sampling: uniform
      include_timestamps: True
      # EAGER: compute model-score margins and summary-only scores during rollout.
      compute_margins: True
      margin_logprobs_k: 64
      margin_temperature: 1.0
      summary_only_logprobs_k: 64

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: False

trainer:
  project_name: revise_nextqa
  experiment_name: qwen2.5-vl-3b-revise-grpo-eager-paper-100
  total_epochs: 1
  total_training_steps: 100
  n_gpus_per_node: 4
  resume_mode: disable
  val_before_train: False
  test_freq: -1
  save_freq: 100
  max_actor_ckpt_to_keep: 1
  logger: ["console", "wandb"]
  # Use an absolute path so Hydra's run-dir chdir doesn't nest outputs under outputs/YYYY-MM-DD/HH-MM-SS/.
  default_local_dir: ${hydra:runtime.cwd}/outputs/2026-01-24/revise_nextqa_grpo_eager_paper_reward_100

ray_kwargs:
  ray_init:
    num_cpus: 32
