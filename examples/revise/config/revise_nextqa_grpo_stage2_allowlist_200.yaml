hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

custom_reward_function:
  path: pkg://verl.utils.reward_score.accuracy_with_format
  name: compute_score
  reward_kwargs:
    reward_weights:
      # Primary objective: final answer correctness.
      answer: 1.0

      # Small conditional bonuses (applied only when correct; see implementation).
      format: 0.1
      summary: 0.1
      think: 0.0

      # Multi-round shaping: reward REAL progress (requesting NEW frames).
      effective_round_bonus: 0.1

      # Discourage guessing: if the model outputs a valid <answer> but it is wrong, apply a penalty.
      incorrect_answer_penalty: 0.3

      # Hard negative for illegal actions (missing/invalid tags, invalid <frames> request, <think>, etc.).
      illegal_action_penalty: 10.0

data:
  custom_cls:
    path: pkg://verl.utils.dataset.nextqa_dataset
    name: NextQADataset
  nextqa:
    video_root: /shares/hlw3876/chenwei/NExT-QA/NExTVideo
    map_json: /shares/hlw3876/chenwei/NExT-QA/map_vid_vidorID.json
  train_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/train.csv
  val_files: /shares/hlw3876/chenwei/NExT-QA/nextqa/val.csv
  max_prompt_length: 8192
  max_response_length: 4096
  train_batch_size: 2
  dataloader_num_workers: 0
  return_raw_chat: True
  return_multi_modal_inputs: False

actor_rollout_ref:
  model:
    # Start from stage1 checkpoint (actor/huggingface).
    path: /shares/hlw3876/chenwei/verl_outputs/outputs/2026-01-19/revise_nextqa_grpo_stage1_ids_roundbonus_200/global_step_200/actor/huggingface
    use_fused_kernels: True
  ref:
    fsdp_config:
      model_dtype: bfloat16
  actor:
    fsdp_config:
      model_dtype: bfloat16
    optim:
      lr: 3e-6
    ppo_mini_batch_size: 128
    use_dynamic_bsz: True
    use_kl_loss: True
    kl_loss_coef: 0.003
    entropy_coeff: 0.01
    checkpoint:
      save_contents: ["hf_model"]
      load_contents: []
  rollout:
    name: vllm
    prompt_length: ${data.max_prompt_length}
    response_length: ${data.max_response_length}
    max_new_tokens: 160
    temperature: 0.4
    top_p: 0.9
    do_sample: True
    n: 4
    dtype: bfloat16
    gpu_memory_utilization: 0.6
    enable_chunked_prefill: False
    enable_prefix_caching: False
    load_format: auto
    max_model_len: 12288
    max_num_batched_tokens: 12288
    data_parallel_size: 1
    tensor_model_parallel_size: 4
    pipeline_model_parallel_size: 1
    limit_images: 25
    agent:
      default_agent_loop: revise_agent
      rollout_mode: hybrid
    revise:
      max_rounds: 5
      max_frames_per_round: 5
      max_vision_inputs: 25
      max_retries_per_round: 0
      initial_sampling: uniform
      include_timestamps: True
      terminate_on_invalid_action: True
      hide_seen_frames_in_prompt: True
      include_candidate_frames_in_prompt: True
      candidate_frames_in_prompt_k: 20
      # Allowlist (interval-based) candidate action space using raw indices.
      use_candidate_frame_ids: False
      require_candidate_frames: True

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: False
  kl_ctrl:
    type: adaptive
    kl_coef: 0.005
    target_kl: 0.15

trainer:
  project_name: revise_nextqa
  experiment_name: qwen2.5-vl-3b-revise-grpo-stage2-allowlist-200
  total_epochs: 1
  total_training_steps: 200
  n_gpus_per_node: 4
  resume_mode: disable
  val_before_train: False
  test_freq: -1
  save_freq: 50
  max_actor_ckpt_to_keep: 4
  logger: ["console", "wandb"]
  default_local_dir: /shares/hlw3876/chenwei/verl_outputs/outputs/2026-01-19/revise_nextqa_grpo_stage2_allowlist_200

ray_kwargs:
  ray_init:
    num_cpus: 32

